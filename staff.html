<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paradisio — Staff check-in</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --pink:#ff28aa; --white:#fff; --bg:#000; --card:#0a0a0a; --line:#232323; }
  * { box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--white); margin:0; padding:40px 16px; }
  .wrap { max-width:420px; margin:0 auto; }
  h1 { font-family:'Orbitron',sans-serif; font-size:18px; text-align:center; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; }
  .stat-row { display:flex; gap:10px; margin-bottom:20px; }
  .stat { flex:1; background:#000; border:1px solid var(--line); border-radius:8px; padding:12px; text-align:center; }
  .stat-num { font-family:'Orbitron',sans-serif; font-size:22px; }
  .stat-label { font-size:10px; color:#777; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12px; color:#999; margin-bottom:6px; }
  .field input { width:100%; background:#000; border:1px solid var(--line); color:#fff; padding:12px; border-radius:7px; font-size:15px; }
  .btn { width:100%; font-weight:600; font-size:14px; padding:14px; border-radius:8px; border:none; cursor:pointer; background:var(--white); color:#000; }
  .result { margin-top:16px; padding:14px; border-radius:8px; font-size:14px; }
  .ok { background:#0a2a12; color:#7fe0a0; border:1px solid #1a5a30; }
  .bad { background:#2a0a0a; color:#e07f7f; border:1px solid #5a1a1a; }
  .used { background:#2a2200; color:#e0c87f; border:1px solid #5a4a1a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Paradisio · Check-in de puerta</h1>
  <div class="card">
    <div class="stat-row">
      <div class="stat"><div class="stat-num" id="s-free">–</div><div class="stat-label">Gratis</div></div>
      <div class="stat"><div class="stat-num" id="s-paid">–</div><div class="stat-label">Pagadas</div></div>
      <div class="stat"><div class="stat-num" id="s-in">–</div><div class="stat-label">En puerta</div></div>
    </div>
    <div class="field"><label>Clave de staff</label><input type="password" id="passcode" /></div>
    <div class="field"><label>Código de ticket (PDS-XXXXXX)</label><input type="text" id="ticket-id" autocapitalize="characters" /></div>
    <button class="btn" id="btn-checkin">Validar e ingresar</button>
    <div id="result"></div>
  </div>
</div>
<script>
  async function refreshStats(){
    try {
      const r = await fetch('/api/availability');
      const d = await r.json();
      document.getElementById('s-free').textContent = d.free;
      document.getElementById('s-paid').textContent = d.paid;
      document.getElementById('s-in').textContent = d.checkedin;
    } catch(e){}
  }
  refreshStats();

  document.getElementById('btn-checkin').onclick = async function(){
    const passcode = document.getElementById('passcode').value;
    const ticketId = document.getElementById('ticket-id').value.trim().toUpperCase();
    const resultEl = document.getElementById('result');
    if(!ticketId) return;
    try {
      const r = await fetch('/api/checkin', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticketId, passcode })
      });
      const d = await r.json();
      if(r.status === 401){
        resultEl.innerHTML = '<div class="result bad">Clave de staff incorrecta.</div>';
        return;
      }
      if(!d.ok){
        if(d.reason === 'not_found'){
          resultEl.innerHTML = '<div class="result bad">Ticket no encontrado: '+ticketId+'</div>';
        } else if(d.reason === 'already_used'){
          resultEl.innerHTML = '<div class="result used">Ya ingresó — '+d.ticket.name+' ('+new Date(d.ticket.checkedInAt).toLocaleTimeString()+')</div>';
        }
        return;
      }
      resultEl.innerHTML = '<div class="result ok">✓ Ingreso validado — '+d.ticket.name+' ('+(d.ticket.type==='paid'?'Pagada':'Lista gratis')+')</div>';
      document.getElementById('ticket-id').value = '';
      refreshStats();
    } catch(e){
      resultEl.innerHTML = '<div class="result bad">Error de conexión, intenta de nuevo.</div>';
    }
  };
</script>
</body>
</html>

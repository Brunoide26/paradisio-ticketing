<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paradisio — Staff check-in</title>
<style>
  @font-face { font-family:'Orbitron'; src:url('fonts/Orbitron.ttf') format('truetype'); font-weight:400 900; font-display:swap; }
  @font-face { font-family:'Inter'; src:url('fonts/Inter.ttf') format('truetype'); font-weight:100 900; font-display:swap; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  #qr-reader { width:100%; border-radius:10px; overflow:hidden; margin-bottom:14px; }
  #qr-reader video { border-radius:10px; }
  .scan-toggle { width:100%; margin-bottom:14px; }
  :root { --pink:#FD5400; --white:#fff; --bg:#000; --card:#0a0a0a; --line:#232323; }
  * { box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--white); margin:0; padding:40px 16px; }
  .wrap { max-width:420px; margin:0 auto; }
  h1 { font-family:'Orbitron',sans-serif; font-size:18px; text-align:center; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; }
  .stat-row { display:flex; gap:10px; margin-bottom:20px; }
  .stat { flex:1; background:#000; border:1px solid var(--line); border-radius:8px; padding:12px; text-align:center; }
  .stat-num { font-family:'Orbitron',sans-serif; font-size:22px; }
  .stat-label { font-size:10px; color:#777; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12px; color:#999; margin-bottom:6px; }
  .field input { width:100%; background:#000; border:1px solid var(--line); color:#fff; padding:12px; border-radius:7px; font-size:15px; }
  .btn { width:100%; font-weight:600; font-size:14px; padding:14px; border-radius:8px; border:none; cursor:pointer; background:var(--white); color:#000; }
  .result { margin-top:16px; padding:18px; border-radius:8px; font-size:17px; font-weight:700; text-align:center; line-height:1.5; }
  .ok { background:#0a2a12; color:#7fe0a0; border:1px solid #1a5a30; }
  .bad { background:#2a0a0a; color:#e07f7f; border:1px solid #5a1a1a; }
  .used { background:#2a2200; color:#e0c87f; border:1px solid #5a4a1a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Paradisio · Check-in de puerta</h1>
  <div class="card">
    <div class="stat-row">
      <div class="stat"><div class="stat-num" id="s-free">–</div><div class="stat-label">Gratis</div></div>
      <div class="stat"><div class="stat-num" id="s-paid">–</div><div class="stat-label">Pagadas</div></div>
      <div class="stat"><div class="stat-num" id="s-in">–</div><div class="stat-label">En puerta</div></div>
    </div>
    <div class="field"><label>Clave de staff</label><input type="password" id="passcode" /></div>

    <button class="btn scan-toggle" id="btn-scan" style="background:var(--pink);">📷 Escanear QR con cámara</button>
    <div id="qr-reader" style="display:none;"></div>

    <div class="field"><label>O escribe el código manualmente (PDS-XXXXXX)</label><input type="text" id="ticket-id" autocapitalize="characters" /></div>
    <button class="btn" id="btn-checkin">Validar e ingresar</button>
    <div id="result"></div>
  </div>
</div>
<script>
  document.getElementById('passcode').value = localStorage.getItem('paradisio_staff_passcode') || '';

  async function refreshStats(){
    try {
      const r = await fetch('/api/availability');
      const d = await r.json();
      document.getElementById('s-free').textContent = d.free;
      document.getElementById('s-paid').textContent = d.paid;
      document.getElementById('s-in').textContent = d.checkedin;
    } catch(e){}
  }
  refreshStats();

  async function doCheckin(ticketId){
    const passcode = document.getElementById('passcode').value;
    const resultEl = document.getElementById('result');
    if(!ticketId) return;
    resultEl.innerHTML = '<div class="result">Verificando…</div>';
    resultEl.scrollIntoView({behavior:'smooth', block:'center'});
    try {
      const r = await fetch('/api/checkin', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticketId, passcode })
      });
      const d = await r.json();
      if(r.status === 401){
        resultEl.innerHTML = '<div class="result bad">✗ Clave de staff incorrecta.</div>';
        resultEl.scrollIntoView({behavior:'smooth', block:'center'});
        return;
      }
      // passcode was accepted -> remember it on this device so staff don't retype it
      localStorage.setItem('paradisio_staff_passcode', passcode);

      if(!d.ok){
        if(d.reason === 'not_found'){
          resultEl.innerHTML = '<div class="result bad">✗ INVÁLIDO — ticket no encontrado: '+ticketId+'</div>';
        } else if(d.reason === 'already_used'){
          resultEl.innerHTML = '<div class="result used">⚠ YA INGRESÓ — '+d.ticket.name+' (DNI '+(d.ticket.dni||'—')+') a las '+new Date(d.ticket.checkedInAt).toLocaleTimeString()+'</div>';
        } else if(d.reason === 'voided'){
          resultEl.innerHTML = '<div class="result bad">✗ ANULADO — '+d.ticket.name+' (DNI '+(d.ticket.dni||'—')+') — NO debe ingresar</div>';
        }
        resultEl.scrollIntoView({behavior:'smooth', block:'center'});
        return;
      }
      resultEl.innerHTML = '<div class="result ok">✓ VÁLIDO — '+d.ticket.name+'<br/>DNI '+(d.ticket.dni||'—')+' · '+(d.ticket.type==='paid'?'Entrada pagada':'Lista gratis')+'</div>';
      resultEl.scrollIntoView({behavior:'smooth', block:'center'});
      document.getElementById('ticket-id').value = '';
      refreshStats();
    } catch(e){
      resultEl.innerHTML = '<div class="result bad">Error de conexión, intenta de nuevo.</div>';
      resultEl.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }

  document.getElementById('btn-checkin').onclick = function(){
    const ticketId = document.getElementById('ticket-id').value.trim().toUpperCase();
    doCheckin(ticketId);
  };

  let scanner = null;
  let scanning = false;
  document.getElementById('btn-scan').onclick = function(){
    const container = document.getElementById('qr-reader');
    if(scanning){
      if(scanner) scanner.stop().catch(()=>{});
      container.style.display = 'none';
      scanning = false;
      document.getElementById('btn-scan').textContent = '📷 Escanear QR con cámara';
      return;
    }
    container.style.display = 'block';
    scanning = true;
    document.getElementById('btn-scan').textContent = '✕ Cerrar cámara';
    scanner = new Html5Qrcode('qr-reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 240 },
      function(decodedText){
        document.getElementById('ticket-id').value = decodedText.trim().toUpperCase();
        doCheckin(decodedText.trim().toUpperCase());
        // brief pause so staff can see the result before scanning the next person
        scanner.pause(true);
        setTimeout(function(){ if(scanning) scanner.resume(); }, 2000);
      },
      function(){ /* ignore per-frame scan errors */ }
    ).catch(function(err){
      document.getElementById('result').innerHTML = '<div class="result bad">No se pudo acceder a la cámara: '+err+'</div>';
      scanning = false;
      container.style.display = 'none';
      document.getElementById('btn-scan').textContent = '📷 Escanear QR con cámara';
    });
  };
</script>
</body>
</html>
